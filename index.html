<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BOON NEWS · ฟีดความเคลื่อนไหวทุกวัด</title>
<meta name="description" content="ฟีดความเคลื่อนไหวทุกวัดในเครือข่าย เรียงตามวันที่อัปเดต">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #EEF1F8; font-family: 'IBM Plex Sans Thai', sans-serif; color: #1B2348; min-height: 100vh; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input { font: inherit; outline: none; }
  input::placeholder { color: #9AA2BF; }
  ::-webkit-scrollbar { width: 9px; height: 9px; }
  ::-webkit-scrollbar-thumb { background: #C7CEE0; border-radius: 6px; }

  .mono { font-family: 'Space Mono', monospace; }

  /* ===== APP BAR ===== */
  .appbar { display: flex; align-items: center; gap: 22px; padding: 13px 28px; border-bottom: 1px solid #E4E8F3; background: rgba(255,255,255,0.94); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 40; flex-wrap: wrap; }
  .logo-link { display: flex; align-items: center; gap: 13px; text-decoration: none; }
  .logo-stack { display: flex; flex-direction: column; gap: 3px; line-height: 1; }
  .logo-boon { align-self: flex-start; background: linear-gradient(95deg, #FF9E33, #F5821F); padding: 2px 8px 3px; transform: skewX(-10deg); box-shadow: 0 2px 7px rgba(245,130,31,0.32); }
  .logo-news { align-self: flex-start; margin-left: 6px; background: #15276B; padding: 2px 8px 3px; transform: skewX(-10deg); box-shadow: 0 2px 7px rgba(21,39,107,0.28); }
  .logo-word { display: inline-block; transform: skewX(10deg); color: #fff; font-weight: 800; font-size: 15px; letter-spacing: 0.03em; }
  .logo-sub { font-size: 13px; color: #6B7393; border-left: 1px solid #E4E8F3; padding-left: 13px; }
  .seg { display: inline-flex; border: 1.5px solid #15276B; border-radius: 22px; overflow: hidden; font-size: 14px; font-weight: 600; }
  .seg > * { padding: 7px 16px; white-space: nowrap; transition: all 0.15s ease; text-decoration: none; }
  .seg-filter > * { padding: 7px 18px; }
  .seg .on { background: #15276B; color: #fff; }
  .seg .off { background: transparent; color: #15276B; }
  .searchbox { display: flex; align-items: center; gap: 9px; border: 1.5px solid #E0E5F1; border-radius: 22px; padding: 7px 14px; background: #F4F6FB; min-width: 230px; }
  .searchbox input { border: none; background: transparent; flex: 1; font-size: 14px; color: #1B2348; }

  /* ===== PAGE HEAD ===== */
  .page-head { max-width: 1240px; margin: 0 auto; padding: 30px 32px 8px; }
  .page-eyebrow { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #F5821F; margin-bottom: 9px; }
  .page-head-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .page-head h1 { font-size: 33px; font-weight: 700; margin: 0; line-height: 1.12; color: #15276B; letter-spacing: -0.015em; }
  .page-count { font-family: 'Space Mono', monospace; font-size: 12.5px; color: #6B7393; white-space: nowrap; }

  /* ===== GRID ===== */
  .grid-wrap { max-width: 1240px; margin: 0 auto; padding: 22px 32px 70px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
  .card { background: #fff; border: 1px solid #E4E8F3; border-radius: 16px; padding: 20px 21px 18px; display: flex; flex-direction: column; box-shadow: 0 6px 22px rgba(20,33,92,0.06); }
  .card-top { display: flex; align-items: center; gap: 9px; margin-bottom: 13px; }
  .act-pill { display: inline-flex; align-items: center; gap: 7px; border-radius: 20px; padding: 4px 11px; font-size: 11.5px; font-weight: 700; color: #fff; }
  .act-pill .wdot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
  .card-scope { font-family: 'Space Mono', monospace; font-size: 10.5px; color: #B3BAD0; }
  .card-name { font-size: 18px; font-weight: 700; line-height: 1.28; color: #15276B; letter-spacing: -0.01em; }
  .card-place { font-size: 12.5px; color: #6B7393; margin-top: 4px; }
  .card-act { margin-top: 15px; padding-top: 14px; border-top: 1px solid #EEF1F8; }
  .card-act .lbl { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #97A0BC; margin-bottom: 5px; }
  .card-act .tt { font-size: 14px; color: #1B2348; font-weight: 500; line-height: 1.42; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-date { margin-top: 13px; display: flex; align-items: center; gap: 8px; }
  .card-date .ico { font-size: 13px; color: #F5821F; }
  .card-date .tx { font-size: 13px; color: #3A4360; }
  .card-date b { color: #1B2348; }
  .card-spacer { flex: 1; min-height: 14px; }
  .card-cta { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px; border: 1.5px solid #15276B; color: #15276B; border-radius: 24px; padding: 10px; font-size: 13.5px; font-weight: 600; text-decoration: none; transition: all 0.13s ease; }
  .card-cta:hover { background: #15276B; color: #fff; }

  .no-results { margin: 40px auto; max-width: 460px; padding: 36px; border: 1.5px dashed #C7CEE0; border-radius: 16px; text-align: center; background: #F7F9FD; }
  .no-results .circle { width: 46px; height: 46px; border-radius: 50%; border: 1.5px dashed #A9B2CC; margin: 0 auto 12px; }
  .no-results .tt { font-weight: 700; font-size: 16px; color: #15276B; margin-bottom: 5px; }
  .no-results p { font-size: 13px; color: #6B7393; margin: 0; line-height: 1.55; }
</style>
</head>
<body>

<!-- ===== APP BAR ===== -->
<header class="appbar">
  <a class="logo-link" href="./">
    <span class="logo-stack">
      <span class="logo-boon"><span class="logo-word">BOON</span></span>
      <span class="logo-news"><span class="logo-word">NEWS</span></span>
    </span>
    <span class="logo-sub">ฟีดความเคลื่อนไหวทุกวัด</span>
  </a>

  <div class="seg">
    <a class="off" href="map.html">▦ แผนที่</a>
    <span class="on">▤ กริด</span>
    <a class="off" href="events.html">▣ ข่าวงานบุญ</a>
  </div>

  <div style="flex: 1;"></div>

  <div class="seg seg-filter" id="filterSeg">
    <button data-f="all" class="on">ทั้งหมด</button>
    <button data-f="th" class="off">ในไทย</button>
    <button data-f="world" class="off">ต่างประเทศ</button>
  </div>

  <div class="searchbox">
    <span style="color: #9AA2BF; font-size: 14px;">⌕</span>
    <input id="searchInput" placeholder="ค้นหาศูนย์ / พื้นที่…">
  </div>
</header>

<!-- ===== PAGE HEAD ===== -->
<div class="page-head">
  <div class="page-eyebrow">— อัปเดตล่าสุด</div>
  <div class="page-head-row">
    <h1>ความเคลื่อนไหวทุกวัด · เรียงตามวันที่อัปเดต</h1>
    <div class="page-count"><span id="count">—</span> ศูนย์ · ใหม่สุดอยู่บน</div>
  </div>
</div>

<!-- ===== GRID ===== -->
<div class="grid-wrap">
  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display: none;">
    <div class="circle"></div>
    <div class="tt">ไม่พบศูนย์ที่ค้นหา</div>
    <p>ลองเปลี่ยนคำค้น หรือเลือกตัวกรองอื่น</p>
  </div>
</div>

<script>
(function () {
  'use strict';

  var state = { filter: 'all', search: '' };
  var CENTERS = []; // โหลดจาก centers.json (สร้างด้วย scripts/build_centers_json.py)

  function centerTier(clips) { return clips >= 40 ? 'high' : clips >= 15 ? 'mid' : 'low'; }
  // ป้ายความเคลื่อนไหว — ใช้ active_level จริงจากเพจ ถ้าไม่มีให้ประเมินจากจำนวนคลิป
  function pill(c) {
    if (c.active === 'active') return { label: 'เคลื่อนไหวสูง', bg: '#F5821F' };
    if (c.active === 'พอใช้') return { label: 'เคลื่อนไหวปานกลาง', bg: 'rgba(245,130,31,0.78)' };
    if (c.active === 'เงียบ') return { label: 'เคลื่อนไหวน้อย', bg: 'rgba(149,160,188,0.9)' };
    if (c.active === 'ไม่มีเพจ') return { label: 'ไม่มีเพจ', bg: 'rgba(149,160,188,0.9)' };
    var t = centerTier(c.clips);
    if (t === 'high') return { label: 'เคลื่อนไหวสูง', bg: '#F5821F' };
    if (t === 'mid') return { label: 'เคลื่อนไหวปานกลาง', bg: 'rgba(245,130,31,0.78)' };
    return { label: 'เคลื่อนไหวน้อย', bg: 'rgba(149,160,188,0.9)' };
  }

  function placeOf(c) {
    if (c.scope === 'INTL') return [c.en, c.country].filter(Boolean).join(' · ');
    return [c.province, 'ภาค' + c.region].filter(Boolean).join(' · ');
  }
  function activityOf(c) {
    if (c.videos && c.videos.length) return c.videos[0].t;
    if (c.types && c.types.length) return c.types.join(' · ');
    return '—';
  }
  function fmtLast(c) { return c.lastPost ? c.lastPost.replace(/(\D)(\d{4})$/, '$1 $2') : ''; }

  function esc(s) { return ('' + s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

  function render() {
    var q = state.search.trim().toLowerCase();

    var list = CENTERS.slice();
    if (state.filter === 'th') list = list.filter(function (c) { return c.scope === 'TH'; });
    if (state.filter === 'world') list = list.filter(function (c) { return c.scope === 'INTL'; });
    if (q) {
      list = list.filter(function (c) {
        var hay = (c.name + ' ' + (c.en || '') + ' ' + c.country + ' ' + (c.province || '') + ' ' + c.region).toLowerCase();
        return hay.indexOf(q) !== -1;
      });
    }

    // ใหม่สุดอยู่บน: เรียงจากโพสต์ล่าสุดบนเพจ แล้วค่อยจำนวนคลิปในคลัง
    list.sort(function (a, b) { return (b.lastTs || 0) - (a.lastTs || 0) || b.clips - a.clips; });

    document.querySelectorAll('#filterSeg button').forEach(function (b) {
      b.className = state.filter === b.dataset.f ? 'on' : 'off';
    });

    document.getElementById('count').textContent = list.length;
    document.getElementById('noResults').style.display = list.length === 0 ? 'block' : 'none';

    var html = '';
    list.forEach(function (c) {
      var p = pill(c);
      var last = fmtLast(c);
      var cta = c.fb
        ? '<a class="card-cta" href="' + esc(c.fb) + '" target="_blank" rel="noopener">ดูข้อมูลหน้าเพจ ↗</a>'
        : '<a class="card-cta" href="map.html">ดูบนแผนที่ →</a>';
      html += '<div class="card">' +
        '<div class="card-top">' +
        '<span class="act-pill" style="background: ' + p.bg + ';"><span class="wdot"></span>' + esc(p.label) + '</span>' +
        '<span class="card-scope">' + (c.scope === 'INTL' ? 'ต่างประเทศ' : 'ในไทย') + '</span></div>' +
        '<div class="card-name">' + esc(c.name) + '</div>' +
        '<div class="card-place">' + esc(placeOf(c)) + '</div>' +
        '<div class="card-act"><div class="lbl">ทำกิจกรรม</div>' +
        '<div class="tt">' + esc(activityOf(c)) + '</div></div>' +
        '<div class="card-date"><span class="ico">📅</span>' +
        '<span class="tx">อัปเดตล่าสุด <b>' + (last ? esc(last) : '—') + '</b></span></div>' +
        '<div class="card-spacer"></div>' +
        cta +
        '</div>';
    });
    document.getElementById('grid').innerHTML = html;
  }

  document.querySelectorAll('#filterSeg button').forEach(function (b) {
    b.addEventListener('click', function () { state.filter = b.dataset.f; render(); });
  });
  document.getElementById('searchInput').addEventListener('input', function (e) { state.search = e.target.value; render(); });

  fetch('centers.json')
    .then(function (r) { return r.json(); })
    .then(function (d) { CENTERS = d.centers; render(); })
    .catch(function () {
      document.getElementById('noResults').style.display = 'block';
      document.querySelector('#noResults .tt').textContent = 'โหลดข้อมูลไม่สำเร็จ';
      document.querySelector('#noResults p').textContent = 'ไม่พบ centers.json — รัน python3 scripts/build_centers_json.py ก่อน';
    });

  render();
})();
</script>
</body>
</html>
