<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ข่าวงานบุญและกิจกรรมวัด</title>
  <meta name="description" content="รวมข่าวงานบุญ พิธีกรรม และกิจกรรมของวัด ทั้งในและต่างประเทศ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Noto+Serif+Thai:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-soft: #f8f9fa;
      --border: #e8eaed;
      --border-soft: #f1f3f5;
      --text: #1a1a1a;
      --text-soft: #6b7280;
      --text-mute: #9ca3af;
      --red: #c0392b;
      --accent: #1a1a1a;
      --accent-soft: #2b2b2b;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-hover: 0 4px 14px rgba(0,0,0,0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Sarabun', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; }

    /* ========== HEADER ========== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .filters {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 20px;
    }

    .filter-row {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 2px 0;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }

    .filter-row::-webkit-scrollbar { height: 4px; }
    .filter-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .filter-row + .filter-row { margin-top: 8px; }

    .filter-btn {
      flex: 0 0 auto;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .filter-btn:hover {
      background: var(--bg-soft);
      border-color: var(--text-mute);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .filter-btn .count {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-mute);
    }

    .filter-btn.active .count { color: rgba(255,255,255,0.7); }

    /* ========== MAIN ========== */
    main {
      flex: 1;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }

    .result-info {
      font-size: 0.92rem;
      color: var(--text-soft);
      margin-bottom: 16px;
      text-align: center;
    }

    .result-info strong { color: var(--text); font-weight: 600; }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    }

    .empty {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-soft);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* ========== CARD ========== */
    .card {
      background: var(--bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 0;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--bg-soft);
      color: var(--text);
      border: 1px solid var(--border);
      letter-spacing: 0.3px;
    }

    .tag-more {
      position: relative;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--text-soft);
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .tag-more:hover { background: var(--text); }

    .tag-popup {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--text);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.78rem;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 10;
      display: none;
    }

    .tag-popup.show { display: block; }
    .tag-popup::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 12px;
      border: 5px solid transparent;
      border-bottom-color: var(--text);
      border-top: 0;
    }

    .badge-important {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--red);
    }

    .countdown {
      margin-left: auto;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-soft);
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .countdown.soon { color: var(--red); }
    .countdown.today {
      background: var(--red);
      color: #fff;
      padding: 3px 10px;
      border-radius: 999px;
    }

    .card-body { padding: 10px 16px 14px; flex: 1; }

    .card-temple {
      font-family: 'Noto Serif Thai', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 4px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 6px;
      line-height: 1.4;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.93rem;
      color: var(--text-soft);
      margin-top: 8px;
    }

    .meta-row .icon { font-size: 1rem; }

    .card-footer {
      border-top: 1px solid var(--border-soft);
      padding: 12px 16px;
      display: flex;
      justify-content: center;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.15s ease;
    }

    .download-btn:hover { background: var(--accent-soft); }

    .download-count {
      background: rgba(255,255,255,0.2);
      padding: 1px 8px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    /* ========== MODAL ========== */
    .modal[hidden] { display: none; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: modalFadeIn 0.18s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(43, 29, 18, 0.55);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      cursor: pointer;
    }

    .modal-content {
      position: relative;
      background: var(--bg);
      border-radius: 18px;
      width: min(720px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      padding: 28px 24px 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      animation: modalSlideUp 0.22s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    @keyframes modalSlideUp {
      from { transform: translateY(20px) scale(0.97); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      font-size: 1.6rem;
      line-height: 1;
      color: var(--text-soft);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--bg-soft); }

    .modal-title {
      font-family: 'Noto Serif Thai', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 4px;
      padding-right: 30px;
    }

    .modal-subtitle {
      font-size: 0.9rem;
      color: var(--text-soft);
      text-align: center;
      margin-bottom: 18px;
    }

    .modal-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }

    .modal-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .modal-card:hover,
    .modal-card:focus {
      transform: translateY(-3px);
      border-color: var(--text);
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      outline: none;
    }

    .modal-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--bg-soft);
      display: block;
    }

    .modal-card-label {
      padding: 9px 8px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 600;
      background: var(--bg);
      border-top: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .modal-all {
      margin-top: 18px;
      text-align: center;
    }

    .modal-all-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .modal-all-btn:hover {
      background: var(--bg-soft);
      border-color: var(--text-mute);
      color: var(--text);
    }

    body.modal-open { overflow: hidden; }

    @media (max-width: 480px) {
      .modal-content { padding: 24px 16px 18px; }
      .modal-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .modal-card-label { font-size: 0.82rem; padding: 7px 4px; }
    }

    /* ========== FOOTER ========== */
    .site-footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 0.85rem;
      color: var(--text-mute);
      border-top: 1px solid var(--border-soft);
      margin-top: 30px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 600px) {
      .filter-btn { font-size: 0.88rem; padding: 7px 14px; }
      .grid { grid-template-columns: 1fr; gap: 14px; }
      main { padding: 16px; }
      .card-title { font-size: 1.05rem; }
    }

    /* ========== LOADER ========== */
    .loader {
      text-align: center;
      padding: 50px;
      color: var(--text-soft);
    }

    .loader-spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="filters">
      <div class="filter-row" id="cat-filters" role="tablist" aria-label="หมวดหมู่">
        <button class="filter-btn active" data-cat="all">ทั้งหมด <span class="count"></span></button>
        <button class="filter-btn" data-cat="งานบุญ">งานบุญ <span class="count"></span></button>
        <button class="filter-btn" data-cat="ทำบุญ">ทำบุญ <span class="count"></span></button>
        <button class="filter-btn" data-cat="เทศกาล">เทศกาล <span class="count"></span></button>
        <button class="filter-btn" data-cat="งานอบรม">งานอบรม <span class="count"></span></button>
        <button class="filter-btn" data-cat="ต่างประเทศ">ต่างประเทศ <span class="count"></span></button>
        <button class="filter-btn" data-cat="ศูนย์สาขา">ศูนย์สาขา <span class="count"></span></button>
      </div>
      <div class="filter-row" id="time-filters" role="tablist" aria-label="ช่วงเวลา">
        <button class="filter-btn active" data-time="all">ทั้งหมด</button>
        <button class="filter-btn" data-time="week">อาทิตย์นี้</button>
        <button class="filter-btn" data-time="month">เดือนนี้</button>
        <button class="filter-btn" data-time="important">สำคัญ</button>
        <button class="filter-btn" data-time="nearest">ใกล้ที่สุด</button>
        <button class="filter-btn" data-time="farthest">ไกลที่สุด</button>
      </div>
    </div>
  </header>

  <main>
    <div class="result-info" id="result-info"></div>
    <div id="event-list" class="grid">
      <div class="loader">
        <div class="loader-spinner"></div>
        <p style="margin-top: 12px;">กำลังโหลดข้อมูล...</p>
      </div>
    </div>
  </main>

  <div class="modal" id="card-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content">
      <button class="modal-close" type="button" data-close aria-label="ปิด">×</button>
      <h3 id="modal-title" class="modal-title">เลือกการ์ดที่ต้องการดาวน์โหลด</h3>
      <p class="modal-subtitle" id="modal-subtitle"></p>
      <div class="modal-grid" id="modal-grid"></div>
      <div class="modal-all">
        <button class="modal-all-btn" type="button" id="modal-all-btn">⬇ ดาวน์โหลดทั้งหมด</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <p>รวมข่าวงานบุญและกิจกรรมของวัด</p>
    <p style="margin-top: 4px; opacity: 0.7;">© <span id="year"></span></p>
  </footer>

  <script>
    const THAI_MONTHS = [
      'มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน',
      'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'
    ];

    const state = {
      events: [],
      activeCat: 'all',
      activeTime: 'all',
    };

    function toDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function todayMidnight() {
      const t = new Date();
      t.setHours(0, 0, 0, 0);
      return t;
    }

    function daysUntil(dateStr) {
      const today = todayMidnight();
      const target = toDate(dateStr);
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / 86400000);
    }

    function countdownLabel(dateStr) {
      const d = daysUntil(dateStr);
      if (d < 0) return null;
      if (d === 0) return { text: 'วันนี้', cls: 'today' };
      if (d === 1) return { text: 'พรุ่งนี้', cls: 'soon' };
      if (d <= 7) return { text: `อีก ${d} วัน`, cls: 'soon' };
      return { text: `อีก ${d} วัน`, cls: '' };
    }

    function escapeHTML(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function isThisWeek(dateStr) {
      const d = daysUntil(dateStr);
      return d >= 0 && d <= 7;
    }

    function isThisMonth(dateStr) {
      const today = todayMidnight();
      const target = toDate(dateStr);
      return target.getFullYear() === today.getFullYear()
          && target.getMonth() === today.getMonth();
    }

    function filterAndSort() {
      const today = todayMidnight();
      let list = state.events.filter(ev => toDate(ev.date) >= today);

      if (state.activeCat !== 'all') {
        list = list.filter(ev => ev.categories.includes(state.activeCat));
      }

      if (state.activeTime === 'week') {
        list = list.filter(ev => isThisWeek(ev.date));
      } else if (state.activeTime === 'month') {
        list = list.filter(ev => isThisMonth(ev.date));
      } else if (state.activeTime === 'important') {
        list = list.filter(ev => ev.important === true);
      }

      const dir = state.activeTime === 'farthest' ? -1 : 1;
      list.sort((a, b) => dir * (toDate(a.date) - toDate(b.date)));

      return list;
    }

    function renderCard(ev) {
      const primary = ev.categories[0];
      const rest = ev.categories.slice(1);
      const moreCount = rest.length;
      const cd = countdownLabel(ev.date);

      const cdHTML = cd
        ? `<span class="countdown ${cd.cls}">${cd.cls === 'today' ? '' : '⚡'} ${escapeHTML(cd.text)}</span>`
        : '';

      const importantHTML = ev.important
        ? `<span class="badge-important">★ สำคัญ</span>`
        : '';

      const moreHTML = moreCount > 0
        ? `<button class="tag-more" type="button" aria-label="ดูหมวดที่เหลือ" data-more='${escapeHTML(JSON.stringify(rest))}'>+${moreCount}<span class="tag-popup">${rest.map(escapeHTML).join(' · ')}</span></button>`
        : '';

      const contactHTML = ev.contact
        ? `<div class="meta-row"><span class="icon">📞</span><span>${escapeHTML(ev.contact)}</span></div>`
        : '';

      const cards = ev.cards || [];
      const downloadCount = ev.card_count || cards.length;

      let downloadHTML = '';
      if (downloadCount === 1) {
        downloadHTML = `<a class="download-btn" href="cards/${encodeURIComponent(cards[0])}" download="${escapeHTML(cards[0])}">⬇ ดาวน์โหลดการ์ด</a>`;
      } else if (downloadCount > 1) {
        downloadHTML = `<button class="download-btn" type="button" data-cards='${escapeHTML(JSON.stringify(cards))}' data-event-title='${escapeHTML(ev.title)}'>⬇ ดาวน์โหลดการ์ด <span class="download-count">${downloadCount}</span></button>`;
      }

      return `
        <article class="card">
          <div class="card-top">
            <span class="tag">${escapeHTML(primary)}</span>
            ${moreHTML}
            ${importantHTML}
            ${cdHTML}
          </div>
          <div class="card-body">
            <div class="card-temple">🏯 ${escapeHTML(ev.temple)}</div>
            <div class="card-title">${escapeHTML(ev.title)}</div>
            <div class="meta-row"><span class="icon">📅</span><span>${escapeHTML(ev.date_display)}</span></div>
            ${contactHTML}
          </div>
          ${downloadHTML ? `<div class="card-footer">${downloadHTML}</div>` : ''}
        </article>
      `;
    }

    function render() {
      const list = filterAndSort();
      const root = document.getElementById('event-list');
      const info = document.getElementById('result-info');

      if (list.length === 0) {
        info.innerHTML = '';
        root.innerHTML = `
          <div class="empty" style="grid-column: 1 / -1;">
            <div class="empty-icon">🪷</div>
            <p>ยังไม่มีงานบุญในหมวดที่เลือก</p>
            <p style="font-size: 0.85rem; margin-top: 6px;">ลองเลือกหมวดอื่นหรือช่วงเวลาอื่น</p>
          </div>
        `;
        return;
      }

      info.innerHTML = `พบ <strong>${list.length}</strong> กิจกรรม`;
      root.innerHTML = list.map(renderCard).join('');
    }

    function updateFilterCounts() {
      const today = todayMidnight();
      const upcoming = state.events.filter(ev => toDate(ev.date) >= today);
      document.querySelectorAll('#cat-filters .filter-btn').forEach(btn => {
        const cat = btn.dataset.cat;
        const n = cat === 'all'
          ? upcoming.length
          : upcoming.filter(ev => ev.categories.includes(cat)).length;
        const span = btn.querySelector('.count');
        if (span) span.textContent = `(${n})`;
      });
    }

    function bindFilters() {
      document.getElementById('cat-filters').addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('#cat-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.activeCat = btn.dataset.cat;
        render();
      });

      document.getElementById('time-filters').addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('#time-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.activeTime = btn.dataset.time;
        render();
      });

      document.addEventListener('click', (e) => {
        const more = e.target.closest('.tag-more');
        document.querySelectorAll('.tag-popup.show').forEach(p => {
          if (!more || !more.contains(p)) p.classList.remove('show');
        });
        if (more) {
          const popup = more.querySelector('.tag-popup');
          if (popup) popup.classList.toggle('show');
        }
      });
    }

    function openCardModal(cards, eventTitle) {
      const modal = document.getElementById('card-modal');
      const grid = document.getElementById('modal-grid');
      const subtitle = document.getElementById('modal-subtitle');

      subtitle.textContent = eventTitle ? `${eventTitle} (${cards.length} การ์ด)` : `${cards.length} การ์ด`;

      grid.innerHTML = cards.map((name, i) => `
        <a class="modal-card" href="cards/${encodeURIComponent(name)}" download="${escapeHTML(name)}">
          <img src="cards/${encodeURIComponent(name)}" alt="การ์ดที่ ${i + 1}" loading="lazy">
          <span class="modal-card-label">⬇ การ์ดที่ ${i + 1}</span>
        </a>
      `).join('');

      modal.hidden = false;
      document.body.classList.add('modal-open');
      setTimeout(() => modal.querySelector('.modal-close')?.focus(), 50);
    }

    function closeCardModal() {
      const modal = document.getElementById('card-modal');
      modal.hidden = true;
      document.body.classList.remove('modal-open');
    }

    function downloadAllCards(cards) {
      cards.forEach((name, i) => {
        setTimeout(() => {
          const a = document.createElement('a');
          a.href = `cards/${encodeURIComponent(name)}`;
          a.download = name;
          document.body.appendChild(a);
          a.click();
          a.remove();
        }, i * 350);
      });
    }

    function bindModal() {
      document.addEventListener('click', (e) => {
        const trigger = e.target.closest('.download-btn[data-cards]');
        if (trigger) {
          e.preventDefault();
          const cards = JSON.parse(trigger.dataset.cards);
          openCardModal(cards, trigger.dataset.eventTitle || '');
          return;
        }
        if (e.target.closest('[data-close]')) {
          closeCardModal();
          return;
        }
        if (e.target.closest('#modal-all-btn')) {
          const grid = document.getElementById('modal-grid');
          const names = [...grid.querySelectorAll('.modal-card')].map(a => decodeURIComponent(a.getAttribute('href').replace(/^cards\//, '')));
          downloadAllCards(names);
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !document.getElementById('card-modal').hidden) {
          closeCardModal();
        }
      });
    }

    async function init() {
      document.getElementById('year').textContent = new Date().getFullYear() + 543;
      bindFilters();
      bindModal();
      try {
        const res = await fetch('events.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        state.events = await res.json();
      } catch (err) {
        console.error(err);
        document.getElementById('event-list').innerHTML = `
          <div class="empty" style="grid-column: 1 / -1;">
            <div class="empty-icon">⚠️</div>
            <p>ไม่สามารถโหลดข้อมูลกิจกรรมได้</p>
            <p style="font-size: 0.85rem; margin-top: 6px;">${escapeHTML(err.message)}</p>
          </div>
        `;
        return;
      }
      updateFilterCounts();
      render();
    }

    init();
  </script>
</body>
</html>
